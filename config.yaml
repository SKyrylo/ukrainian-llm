dataset_dir: "dataset"

# All files produced during training (tokenizer, checkpoints, loss plot) are
# written under output_dir.  Set this to your Google Drive folder when running
# in Colab so nothing is lost when the runtime stops.
# Example:  output_dir: "/content/drive/MyDrive/llm"
# Leave empty to save next to this config file (local runs).
output_dir: "/content/drive/MyDrive/llm"

tokenizer:
  tok_load_from: ""                        # Empty str to train a new tokenizer; otherwise path to tokenizer.json
  tok_save_path: "tokenizer.json"          # Filename inside output_dir (or local path when output_dir is empty)
  vocab_size: 32000                        # Target vocabulary size
  tok_train_max_chars: 10000000            # Max chars used to train the tokenizer (10 MB is enough for 32k merges)
  min_freq: null                           # null to train until the vocabulary size is reached
  eos_token: "<|EOS|>"                     # End of sequence token
  unk_token: "<|UNK|>"                     # Unknown token


dataloader:
  batch_size: 8                            # Batch size
  context_length: 1024                     # Maximum sequence length (context window)
  stride: 512                              # Overlapping sequence length
  drop_last: true                          # Drop the last batch if it's not full
  shuffle: true                            # Shuffle the data
  num_workers: 2                           # Number of workers to use for data loading
  encode_max_chars: 30000000               # Chars of corpus to encode (30 MB ≈ 5M tokens). Result cached to disk.


optimizer:
  learning_rate: 0.0004                    # Learning rate
  weight_decay: 0.1                        # Weight decay for regularization


llm_init:
  emb_dim: 768                             # Embedding dimension
  n_heads: 12                              # Number of attention heads
  n_layers: 12                             # Number of transformer layers
  dropout: 0.1                             # Dropout rate
  qkv_bias: false                          # Whether to include bias terms in the query key value projections


llm_train:
  from_pretrained: ""                      # Path to a pretrained model (empty str to train from scratch)
  model_save_path: "model.pth"            # Filename inside output_dir (or local path when output_dir is empty)
  epochs: 10                               # Upper bound — early stopping will halt before this if val_loss stagnates
  train_val_split: 0.9                     # Proportion of data to use for training (the rest is used for validation)
  eval_freq: 500                           # Evaluate every N training steps
  eval_iter: 20                            # Batches used per evaluation
  patience: 3                              # Early stopping: stop if val_loss hasn't improved for this many eval steps


llm_gen:
  max_gen_length: 50                       # Maximum length of generated sequences
  temperature: 1.0                         # Sampling temperature (higher values lead to more random outputs)
  top_k: 50                                # Top-k sampling (0 to disable)
