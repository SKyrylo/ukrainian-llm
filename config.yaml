dataset_dir: "/kaggle/input/datasets/skyrylo/llm-training-dataset-v7/dataset"

# All files produced during this run (tokenizer, token cache, checkpoints,
# loss plot) are written under output_dir.
#
# Colab  → "/content/drive/MyDrive/llm"   (Drive must be mounted first)
# Kaggle → "/kaggle/working"
# Local  → leave empty (files are written next to this config)
output_dir: "/kaggle/working"

# Set to true to encode the corpus, save token_cache.pt to output_dir, and
# exit immediately — without initialising the model or running training.
# Intended for CPU sessions where you only want to pay the encoding cost once.
# Set to false (or remove the key) for normal training runs.
encode_only: false

# Absolute path to a pre-built token_cache.pt produced on another machine
# (e.g. encoded on Colab, now used for Kaggle training).  When set, the
# encoding step is skipped entirely regardless of which files are in
# dataset_dir.  Leave empty ("") to encode/cache normally.
token_cache_from: "/kaggle/working/token_cache.pt"

tokenizer:
  # Leave empty to train a new tokenizer on the current corpus and save it to
  # output_dir/tok_save_path.  Set to an absolute path to load an existing one.
  # Colab:  "/content/drive/MyDrive/llm/tokenizer.json"
  tok_load_from: "/kaggle/input/datasets/skyrylo/llm-training-dataset-v7/models/tokenizer.json"
  tok_save_path: "tokenizer.json"          # Saved as output_dir/tokenizer.json
  vocab_size: 32000                        # Target vocabulary size
  min_freq: null                           # null to train until vocab_size is reached
  eos_token: "<|EOS|>"                     # End of sequence token
  unk_token: "<|UNK|>"                     # Unknown token


dataloader:
  batch_size: 4                            # Batch size
  context_length: 512                      # Maximum sequence length (context window)
  stride: 256                              # Step between consecutive windows
  drop_last: true                          # Drop the last batch if it's not full
  shuffle: true                            # Shuffle the data
  num_workers: 0                           # Workers for data loading (0 = main process)


optimizer:
  learning_rate: 0.0004                    # Learning rate
  weight_decay: 0.1                        # Weight decay for regularization


llm_init:
  emb_dim: 512                             # Embedding dimension
  n_heads: 8                               # Number of attention heads
  n_layers: 6                              # Number of transformer layers
  dropout: 0.2                             # Dropout rate
  qkv_bias: false                          # Bias in query/key/value projections


llm_train:
  from_pretrained: "/kaggle/working/model.pth"  # Path to checkpoint, or empty for fresh start
  model_save_path: "model.pth"             # Saved as output_dir/model.pth
  epochs: 100                               # Upper bound — early stopping may halt sooner
  train_val_split: 0.9                     # Fraction of tokens used for training
  eval_freq: 50                            # Evaluate every N training steps
  eval_iter: 20                            # Batches used per evaluation pass
  patience: 20                             # Early stopping patience (eval steps)


llm_gen:
  max_gen_length: 50                       # Tokens to generate per sample
  temperature: 1.0                         # Sampling temperature
  top_k: 50                                # Top-k filtering (0 to disable)
